        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        Instagram
      </a>
    </div>
    <div class="footer-copy">© 2026 Lideri. Усі права захищені.</div>
  </footer>

  <script src="products.js?v=15"></script>
  <script>
    const nav = document.getElementById('main-nav');
    const NAV_FADE_START = 30, NAV_FADE_END = 160;
    let _navRaf = false;
    function _updateNav() {
      const y = window.scrollY;
      if (y < NAV_FADE_START) {
        nav.classList.add('nav-transparent');
        nav.style.background = '';
        nav.style.boxShadow = '';
        nav.style.borderBottomColor = '';
      } else {
        nav.classList.remove('nav-transparent');
        const p = Math.min(1, (y - NAV_FADE_START) / (NAV_FADE_END - NAV_FADE_START));
        nav.style.background        = `rgba(247,245,242,${(p * 0.96).toFixed(3)})`;
        nav.style.boxShadow         = `0 4px 28px rgba(0,0,0,${(p * 0.06).toFixed(3)})`;
        nav.style.borderBottomColor = `rgba(0,0,0,${(p * 0.08).toFixed(3)})`;
      }
    }
    window.addEventListener('scroll', () => {
      if (!_navRaf) { _navRaf = true; requestAnimationFrame(() => { _updateNav(); _navRaf = false; }); }
    }, { passive: true });
    _updateNav();

    const galleryHeroBg = document.querySelector('.gallery-hero-bg');
    let _gParTarget = 0, _gParCurrent = 0, _gParRunning = false;

    function _gParLoop() {
      _gParCurrent += (_gParTarget - _gParCurrent) * 0.07;
      galleryHeroBg.style.transform = `translateY(${_gParCurrent.toFixed(2)}px)`;
      if (Math.abs(_gParTarget - _gParCurrent) > 0.05) {
        requestAnimationFrame(_gParLoop);
      } else {
        _gParRunning = false;
      }
    }

    window.addEventListener('scroll', () => {
      _gParTarget = window.scrollY * 0.22;
      if (!_gParRunning) { _gParRunning = true; requestAnimationFrame(_gParLoop); }
    }, { passive: true });

    // Туфлі об'єднує також Мері Джейн і Слінгбеки
    const FILTER_GROUPS = {
      tufli: ['tufli', 'meri-dzhein', 'slinhbeky']
    };

    function renderProducts(filter) {
      const grid = document.getElementById('productGrid');
      const cats = FILTER_GROUPS[filter] || [filter];
      const filtered = filter === 'all' ? products : products.filter(p => cats.includes(p.category));

      grid.innerHTML = filtered.map((p, index) => {
        const first = (p.images || []).find(url => url && url.trim() !== '');
        const imgAttrs = index < 4 ? 'fetchpriority="high"' : 'loading="lazy"';
        const imgHtml = first
          ? `<img src="${first}" alt="${p.name}" ${imgAttrs} width="800" height="600" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'" />`
          : '';
        const badgeHtml = p.badge
          ? `<span class="card-badge badge-${p.badge}">${p.badgeLabel}</span>` : '';
        const oldPriceHtml = p.oldPrice
          ? `<span class="card-price-old">${p.oldPrice.toLocaleString('uk-UA')} ₴</span>` : '';

        return `
          <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
            <div class="card-img">
              <div class="card-img-inner">${imgHtml}</div>
              ${badgeHtml}
              <div class="card-overlay"><span class="card-overlay-text">Детальніше</span></div>
            </div>
            <div class="card-body">
              <span class="card-name">${p.name}</span>
              <div>
                <span class="card-price">${p.price.toLocaleString('uk-UA')} ₴</span>
                ${oldPriceHtml}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    renderProducts('all');

    document.getElementById('filterBar').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts(btn.dataset.filter);
    });

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('revealed');
          revealObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('[data-reveal]').forEach(el => revealObserver.observe(el));
  </script>
</body>
